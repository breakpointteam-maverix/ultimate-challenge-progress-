<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👁️ DOORS - Ultimate Challenge Progress</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #121215;
            --border-color: #222227;
            --text-color: #e2e8f0;
            --text-muted: #61616a;
            --success-color: #22c55e;
            
            /* สีประจำแต่ละโซน */
            --color-backdoors: #f43f5e;
            --color-hotel: #eab308;
            --color-rooms: #a855f7;
            --color-outdoors: #06b6d4;
            --color-mines: #f97316;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 650px; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: #fff; font-size: 2.5rem; margin-bottom: 8px; letter-spacing: 1px; }
        header p { color: var(--text-muted); font-size: 1rem; margin: 0; }

        /* Progress Bar สรุปภาพรวม */
        .overall-progress {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .progress-bar-bg { background: #1a1a1f; border-radius: 8px; height: 16px; overflow: hidden; border: 1px solid #25252b; }
        .progress-bar-fill { 
            background: linear-gradient(90deg, var(--color-backdoors), var(--color-hotel), var(--color-rooms), var(--color-mines)); 
            height: 100%; 
            width: 0%; 
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* รายการด่านแบบ 1 ชั้น 1 ติ๊ก */
        .challenge-list {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .challenge-item {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #18181c;
            position: relative;
        }
        .challenge-item:last-child { border-bottom: none; }

        /* แถบสีข้างซ้ายแบ่งตามด่าน */
        .challenge-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
        }
        .ch-backdoors::before { background-color: var(--color-backdoors); }
        .ch-hotel::before { background-color: var(--color-hotel); }
        .ch-rooms::before { background-color: var(--color-rooms); }
        .ch-outdoors::before { background-color: var(--color-outdoors); }
        .ch-mines::before { background-color: var(--color-mines); }

        /* สไตล์ Checkbox (ล็อกให้คลิกไม่ได้บนหน้าเว็บ เพราะอัปเดตผ่านโค้ด) */
        .custom-check {
            position: relative;
            padding-left: 45px;
            font-size: 1.25rem;
            font-weight: 600;
            user-select: none;
            width: 100%;
            cursor: default;
        }
        .custom-check input { position: absolute; opacity: 0; }
        .checkmark { 
            position: absolute; 
            top: -2px; 
            left: 0; 
            height: 26px; 
            width: 26px; 
            background-color: #1a1a1f; 
            border-radius: 6px; 
            border: 2px solid #3a3a42; 
        }
        
        .custom-check input:checked ~ .checkmark { background-color: var(--success-color); border-color: var(--success-color); }
        .checkmark:after { content: ""; position: absolute; display: none; }
        .custom-check input:checked ~ .checkmark:after { display: block; }
        .custom-check .checkmark:after { 
            left: 9px; 
            top: 4px; 
            width: 6px; 
            height: 12px; 
            border: solid #000; 
            border-width: 0 3px 3px 0; 
            transform: rotate(45deg); 
        }
        
        .custom-check input:checked ~ .challenge-name { text-decoration: line-through; color: var(--text-muted); }
        
        /* สีกำกับชื่อด่านตอนยังไม่ติ๊ก */
        .ch-backdoors input:not(:checked) ~ .challenge-name { color: var(--color-backdoors); }
        .ch-hotel input:not(:checked) ~ .challenge-name { color: var(--color-hotel); }
        .ch-rooms input:not(:checked) ~ .challenge-name { color: var(--color-rooms); }
        .ch-outdoors input:not(:checked) ~ .challenge-name { color: var(--color-outdoors); }
        .ch-mines input:not(:checked) ~ .challenge-name { color: var(--color-mines); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>👁️ Ultimate Challenge Progress</h1>
        <p>บันทึกการเดินทางทำภารกิจสูงสุดของแต่ละโซน</p>
    </header>

    <!-- แถบแสดงพลังความสำเร็จรวม -->
    <div class="overall-progress">
        <div class="progress-info">
            <span>ภาพรวมความสำเร็จ</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
    </div>

    <!-- รายการด่านหลัก 1 ชั้น 1 ติ๊ก -->
    <div class="challenge-list">
        
        <!-- 1. The Backdoors -->
        <div class="challenge-item ch-backdoors">
            <label class="custom-check">
                <input type="checkbox" id="step-0" disabled>
                <span class="checkmark"></span>
                <span class="challenge-name">The Backdoors (-100)</span>
            </label>
        </div>

        <!-- 2. Floor 1: The Hotel -->
        <div class="challenge-item ch-hotel">
            <label class="custom-check">
                <input type="checkbox" id="step-1" disabled>
                <span class="checkmark"></span>
                <span class="challenge-name">Floor 1: The Hotel (Door 100)</span>
            </label>
        </div>

        <!-- 3. The Rooms -->
        <div class="challenge-item ch-rooms">
            <label class="custom-check">
                <input type="checkbox" id="step-2" disabled>
                <span class="checkmark"></span>
                <span class="challenge-name">The Rooms (A-1000)</span>
            </label>
        </div>

        <!-- 4. The Subfloor -->
        <div class="challenge-item ch-outdoors">
            <label class="custom-check">
                <input type="checkbox" id="step-3" disabled>
                <span class="checkmark"></span>
                <span class="challenge-name">The Subfloor / Outdoors</span>
            </label>
        </div>

        <!-- 5. Floor 2: The Mines -->
        <div class="challenge-item ch-mines">
            <label class="custom-check">
                <input type="checkbox" id="step-4" disabled>
                <span class="checkmark"></span>
                <span class="challenge-name">Floor 2: The Mines (Door 200)</span>
            </label>
        </div>

    </div>
</div>

<script>
    // ==========================================
    // 🛠️ โซนสำหรับอัปเดตสถานะผ่านโค้ดด้วยตัวคุณเอง 🛠️
    // เปลี่ยนจาก false เป็น true เมื่อคุณผ่านด่านนั้นๆ แล้ว!
    // ==========================================
    const currentProgress = {
        backdoors: false, // ผ่านด่าน The Backdoors หรือยัง?
        hotel:     false, // ผ่านด่าน Floor 1: The Hotel หรือยัง?
        rooms:     false, // ผ่านด่าน The Rooms (A-1000) หรือยัง?
        outdoors:  false, // ผ่านด่าน The Subfloor / Outdoors หรือยัง?
        mines:     false  // ผ่านด่าน Floor 2: The Mines หรือยัง?
    };

    // ==========================================
    // ระบบคำนวณและแสดงผล UI อัตโนมัติ (ห้ามแก้ไขส่วนนี้)
    // ==========================================
    function applyProgress() {
        document.getElementById('step-0').checked = currentProgress.backdoors;
        document.getElementById('step-1').checked = currentProgress.hotel;
        document.getElementById('step-2').checked = currentProgress.rooms;
        document.getElementById('step-3').checked = currentProgress.outdoors;
        document.getElementById('step-4').checked = currentProgress.mines;

        // คำนวณเปอร์เซ็นต์
        const statusValues = Object.values(currentProgress);
        const total = statusValues.length;
        const completed = statusValues.filter(status => status === true).length;
        const percent = Math.round((completed / total) * 100);

        // แสดงผลบนหน้าเว็บ
        document.getElementById('progress-bar').style.width = `${percent}%`;
        document.getElementById('progress-percent').innerText = `${percent}%`;
    }

    // เรียกใช้งานเมื่อเปิดหน้าเว็บ
    window.addEventListener('DOMContentLoaded', applyProgress);
</script>

</body>
</html>
