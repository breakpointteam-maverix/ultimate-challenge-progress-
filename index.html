<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Doors - All Floors Progress Tracker</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --card-bg: #141417;
            --border-color: #24242b;
            --text-color: #e2e8f0;
            --text-muted: #71717a;
            --success-color: #22c55e;
            
            /* สีประจำแต่ละโซน */
            --color-backdoors: #f43f5e; /* แดงเข้ม */
            --color-hotel: #eab308;     /* เหลืองทอง */
            --color-rooms: #a855f7;     /* ม่วง Retro */
            --color-outdoors: #06b6d4;  /* ฟ้าอมเขียว */
            --color-mines: #f97316;     /* ส้มเหมือง */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #fff;
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Progress Bar ภาพรวม */
        .overall-progress {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            margin-bottom: 35px;
            border: 1px solid var(--border-color);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .progress-bar-bg {
            background: #1f1f23;
            border-radius: 10px;
            height: 24px;
            width: 100%;
            overflow: hidden;
            border: 1px solid #2d2d34;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--color-backdoors), var(--color-hotel), var(--color-mines));
            height: 100%;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* โครงสร้างกล่องแต่ละโซน */
        .floor-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .floor-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
        }

        /* แบ่งสีตามโซน */
        .zone-backdoors::before { background-color: var(--color-backdoors); }
        .zone-hotel::before { background-color: var(--color-hotel); }
        .zone-rooms::before { background-color: var(--color-rooms); }
        .zone-outdoors::before { background-color: var(--color-outdoors); }
        .zone-mines::before { background-color: var(--color-mines); }

        .zone-backdoors .floor-title span:first-child { color: var(--color-backdoors); }
        .zone-hotel .floor-title span:first-child { color: var(--color-hotel); }
        .zone-rooms .floor-title span:first-child { color: var(--color-rooms); }
        .zone-outdoors .floor-title span:first-child { color: var(--color-outdoors); }
        .zone-mines .floor-title span:first-child { color: var(--color-mines); }

        .floor-title {
            font-size: 1.6rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .floor-status-text {
            font-size: 1rem;
            color: var(--text-muted);
            background: #1c1c21;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #2d2d34;
        }

        /* รายการภารกิจ */
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 14px 10px;
            border-bottom: 1px solid #1a1a20;
            transition: background 0.2s;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: #18181c;
        }

        /* Custom Checkbox */
        .checkbox-container {
            position: relative;
            padding-left: 40px;
            cursor: pointer;
            font-size: 1.1rem;
            user-select: none;
            width: 100%;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 2px;
            left: 0;
            height: 24px;
            width: 24px;
            background-color: #1f1f23;
            border-radius: 6px;
            border: 2px solid #3f3f46;
            transition: all 0.2s;
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: #71717a;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 8px;
            top: 4px;
            width: 5px;
            height: 11px;
            border: solid #000;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-desc {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>👁️ DOORS Master Progress</h1>
        <p>บันทึกการเดินทางผ่านฝันร้ายในทุกมิติและทุกชั้น</p>
    </header>

    <div class="overall-progress">
        <div class="progress-info">
            <span>ความสำเร็จรวมทุกด่าน (100% Completion)</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
    </div>

    <div class="floor-section zone-backdoors">
        <div class="floor-title">
            <span>The Backdoors (-100)</span>
            <span class="floor-status-text" id="zone0-status">0/0</span>
        </div>
        <ul class="task-list">
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="0">
                    <span class="checkmark"></span>
                    <span class="task-text">เปิดลิฟต์เข้าสู่ The Backdoors</span>
                    <span class="task-desc">หาทางเข้าลับจากห้อง Lobby ได้สำเร็จ</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="0">
                    <span class="checkmark"></span>
                    <span class="task-text">รอดจากกลไกจำกัดเวลา (Lookman & Blitz)</span>
                    <span class="task-desc">ปั๊มสวิตช์เวลาและหลบผีสปีดด่วนสำเร็จ</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="0">
                    <span class="checkmark"></span>
                    <span class="task-text">ผ่านประตูหลังบานที่ -100</span>
                    <span class="task-desc">หนีรอดและได้รับ "Vial of Nowhere" เพื่อไปต่อ</span>
                </label>
            </li>
        </ul>
    </div>

    <div class="floor-section zone-hotel">
        <div class="floor-title">
            <span>Floor 1: The Hotel</span>
            <span class="floor-status-text" id="zone1-status">0/0</span>
        </div>
        <ul class="task-list">
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="1">
                    <span class="checkmark"></span>
                    <span class="task-text">ผ่านห้องสมุดของ Figure (ประตู 50)</span>
                    <span class="task-desc">แอบถอดรหัสหนังสือโดยไม่โดน Figure ตบ</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="1">
                    <span class="checkmark"></span>
                    <span class="task-text">วิ่งหนี Seek ตาเดียว (ทั้ง 2 รอบ)</span>
                    <span class="task-desc">เลี้ยวถูกทาง หมอบคลานผ่านไฟไหม้ทันเวลา</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="1">
                    <span class="checkmark"></span>
                    <span class="task-text">ผ่านด่านสวนเรือนกระจก (The Greenhouse)</span>
                    <span class="task-desc">เดินฝ่าความมืดช่วงประตู 90+ โดยไม่โดน Rush หรือ Snare</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="1">
                    <span class="checkmark"></span>
                    <span class="task-text">เคลียร์ประตู 100 (ซ่อมลิฟต์หนี Figure)</span>
                    <span class="task-desc">แก้สวิตช์ไฟวงจรและสับคัตเอาต์สำเร็จเพื่อจบโหมดโรงแรม</span>
                </label>
            </li>
        </ul>
    </div>

    <div class="floor-section zone-rooms">
        <div class="floor-title">
            <span>The Rooms (A-000)</span>
            <span class="floor-status-text" id="zone2-status">0/0</span>
        </div>
        <ul class="task-list">
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="2">
                    <span class="checkmark"></span>
                    <span class="task-text">ไขปริศนาทางเข้าห้องบานประตู A-000</span>
                    <span class="task-desc">ใช้กุญแจผี (Skeleton Key) และโยกคันโยกในห้องมืดที่ประตู 60</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="2">
                    <span class="checkmark"></span>
                    <span class="task-text">รอดพ้นจากผีตระกูลสเปเชียล (A-60, A-90, A-120)</span>
                    <span class="task-desc">หลบในตู้ล็อกเกอร์โบราณ และห้ามขยับเมาส์ตอน A-90 โผล่</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="2">
                    <span class="checkmark"></span>
                    <span class="task-text">เดินเท้าทะลุถึงห้อง A-1000</span>
                    <span class="task-desc">มาราธอนผ่าน 1,000 ห้องเพื่อรับ "NVG" หรือฉายาในตำนาน</span>
                </label>
            </li>
        </ul>
    </div>

    <div class="floor-section zone-outdoors">
        <div class="floor-title">
            <span>The Subfloor / Outdoors</span>
            <span class="floor-status-text" id="zone3-status">0/0</span>
        </div>
        <ul class="task-list">
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="3">
                    <span class="checkmark"></span>
                    <span class="task-text">ลิฟต์ตกกระแทกพื้นสู่ด้านล่าง (The Crash)</span>
                    <span class="task-desc">ดูคัตซีนลิฟต์ถล่มลงจากโรงแรมรอดมาได้อย่างหวุดหวิด</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="3">
                    <span class="checkmark"></span>
                    <span class="task-text">สำรวจโซน Outdoors (เหมืองภายนอก)</span>
                    <span class="task-desc">เดินเท้าผ่านซากปรักหักพังและนั่งร้านก่อนจะมุ่งหน้าลงใต้ดิน</span>
                </label>
            </li>
        </ul>
    </div>

    <div class="floor-section zone-mines">
        <div class="floor-title">
            <span>Floor 2: The Mines</span>
            <span class="floor-status-text" id="zone4-status">0/0</span>
        </div>
        <ul class="task-list">
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="4">
                    <span class="checkmark"></span>
                    <span class="task-text">สับสวิตช์จัดระบบรางรถไฟ (Minecart Track)</span>
                    <span class="task-desc">เคลียร์เส้นทางและดันรถเหมืองทะลวงสิ่งกีดขวาง</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="4">
                    <span class="checkmark"></span>
                    <span class="task-text">หนีตายฝูงยักษ์ Grumble ในรัง (ประตู 150)</span>
                    <span class="task-desc">หาเครื่องสแกนและเคลียร์ภารกิจที่ยากบีบหัวใจในห้อง The Nest</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-zone="4">
                    <span class="checkmark"></span>
                    <span class="task-text">พิชิตประตูบอส 200 (The Dam)</span>
                    <span class="task-desc">เอาชนะบอสใหญ่ตัวจี๊ด ปิดประตูเขื่อน และหนีขึ้นลิฟต์สำเร็จ!</span>
                </label>
            </li>
        </ul>
    </div>
</div>

<script>
    const checkboxes = document.querySelectorAll('.progress-check');
    const progressBar = document.getElementById('progress-bar');
    const progressPercent = document.getElementById('progress-percent');
    
    // มีทั้งหมด 5 โซน (0 ถึง 4)
    const totalZones = 5;

    function updateProgress() {
        const totalTasks = checkboxes.length;
        let checkedCount = 0;

        // ตัวแปรนับจำนวนแยกของแต่ละโซน
        let zoneCounts = Array(totalZones).fill(0);
        let zoneChecked = Array(totalZones).fill(0);

        checkboxes.forEach(checkbox => {
            const zoneId = parseInt(checkbox.getAttribute('data-zone'));
            zoneCounts[zoneId]++;

            if (checkbox.checked) {
                checkedCount++;
                zoneChecked[zoneId]++;
            }
        });

        // คำนวณเปอร์เซ็นต์รวมทั้งหมด
        const percent = totalTasks > 0 ? Math.round((checkedCount / totalTasks) * 100) : 0;
        progressBar.style.width = `${percent}%`;
        progressPercent.innerText = `${percent}%`;

        // อัปเดตข้อความแสดงตัวเลขเศษส่วนของแต่ละโซนบนหน้าเว็บ
        for (let i = 0; i < totalZones; i++) {
            document.getElementById(`zone${i}-status`).innerText = `${zoneChecked[i]} / ${zoneCounts[i]}`;
        }

        // เซฟสถานะลง LocalStorage ของบราวเซอร์
        const checkStatus = Array.from(checkboxes).map(cb => cb.checked);
        localStorage.setItem('doorsMasterProgress', JSON.stringify(checkStatus));
    }

    function loadProgress() {
        const savedStatus = JSON.parse(localStorage.getItem('doorsMasterProgress'));
        if (savedStatus) {
            checkboxes.forEach((checkbox, index) => {
                if(savedStatus[index] !== undefined) {
                    checkbox.checked = savedStatus[index];
                }
            });
        }
        updateProgress();
    }

    // ติดตั้ง Event ให้เช็คบ็อกซ์ทุกตัวทำงานเวลาคลิก
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', updateProgress);
    });

    // ให้ฟังก์ชันทำงานทันทีที่โหลดหน้าเว็บเสร็จ
    window.addEventListener('DOMContentLoaded', loadProgress);
</script>

</body>
</html>
