<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Doors - Project Progress Tracker</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent-color: #c9a0dc; /* สีม่วงลึกลับโทน Doors */
            --text-color: #e2e8f0;
            --text-muted: #8a8d98;
            --success-color: #4ade80;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(199, 160, 220, 0.3);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Progress Bar สรุปภาพรวม */
        .overall-progress {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            border: 1px solid #2a2a30;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .progress-bar-bg {
            background: #2d2d34;
            border-radius: 8px;
            height: 20px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--accent-color), var(--success-color));
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-in-out;
        }

        /* สไตล์ของแต่ละ Floor */
        .floor-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #2a2a30;
        }

        .floor-title {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #2d2d34;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .floor-status-text {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* รายการภารกิจ/ด่าน */
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #25252b;
            transition: background 0.2s;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: #222228;
        }

        /* Custom Checkbox */
        .checkbox-container {
            position: relative;
            padding-left: 35px;
            cursor: pointer;
            font-size: 1.05rem;
            user-select: none;
            width: 100%;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 22px;
            width: 22px;
            background-color: #2d2d34;
            border-radius: 5px;
            border: 1px solid #454550;
            transition: all 0.2s;
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: var(--accent-color);
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 7px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid #121214;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        /* ตัวหนังสือเมื่อติ๊กถูก */
        .checkbox-container input:checked ~ .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-desc {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚪 DOORS Progress Tracker</h1>
        <p>บันทึกความคืบหน้าการพิชิตโรงแรมและเหมืองแร่</p>
    </header>

    <!-- สรุปภาพรวม -->
    <div class="overall-progress">
        <div class="progress-info">
            <span>ความคืบหน้ารวมทั้งหมด</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
    </div>

    <!-- FLOOR 1 -->
    <div class="floor-section">
        <div class="floor-title">
            <span>Floor 1: The Hotel</span>
            <span class="floor-status-text" id="floor1-status">0/0</span>
        </div>
        <ul class="task-list">
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-floor="1">
                    <span class="checkmark"></span>
                    <span class="task-text">ผ่านด่านห้องเซฟ (ประตู 50)</span>
                    <span class="task-desc">หลบ Figure และแก้รหัสสมุดสำเร็จ</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-floor="1">
                    <span class="checkmark"></span>
                    <span class="task-text">หนีรอดจาก Seek (ครั้งที่ 1 & 2)</span>
                    <span class="task-desc">วิ่งหลบสิ่งกีดขวางในทางเดินยาว</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-floor="1">
                    <span class="checkmark"></span>
                    <span class="task-text">ผ่านด่านห้องมืดและห้องกรงเล็บ (The Courtyard)</span>
                    <span class="task-desc">เปิดไฟและหาทางไปต่อสำเร็จ</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-floor="1">
                    <span class="checkmark"></span>
                    <span class="task-text">พิชิตประตู 100 (เคลียร์ Floor 1)</span>
                    <span class="task-desc">ซ่อมลิฟต์และหนีจาก Figure สำเร็จ!</span>
                </label>
            </li>
        </ul>
    </div>

    <!-- FLOOR 2 -->
    <div class="floor-section">
        <div class="floor-title">
            <span>Floor 2: The Mines</span>
            <span class="floor-status-text" id="floor2-status">0/0</span>
        </div>
        <ul class="task-list">
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-floor="2">
                    <span class="checkmark"></span>
                    <span class="task-text">ผ่านระบบรางรถไฟขุดเหมือง</span>
                    <span class="task-desc">สับสวิตช์รางรถไฟและเคลียร์ทางเดิน</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-floor="2">
                    <span class="checkmark"></span>
                    <span class="task-text">รอดชีวิตจาก Grumble ในอุโมงค์</span>
                    <span class="task-desc">หลบพวกกิ๊กก๊อกยักษ์ใต้เหมือง</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-floor="2">
                    <span class="checkmark"></span>
                    <span class="task-text">ผ่านด่านห้องประตู 150 (The Nest)</span>
                    <span class="task-desc">ทำภารกิจในโซนรังของผีสำเร็จ</span>
                </label>
            </li>
            <li class="task-item">
                <label class="checkbox-container">
                    <input type="checkbox" class="progress-check" data-floor="2">
                    <span class="checkmark"></span>
                    <span class="task-text">พิชิตประตู 200 (เคลียร์ Floor 2)</span>
                    <span class="task-desc">เอาชนะบอสใหญ่และหนีออกจากเหมืองสำเร็จ!</span>
                </label>
            </li>
        </ul>
    </div>
</div>

<script>
    const checkboxes = document.querySelectorAll('.progress-check');
    const progressBar = document.getElementById('progress-bar');
    const progressPercent = document.getElementById('progress-percent');

    function updateProgress() {
        const total = checkboxes.length;
        let checkedCount = 0;

        // นับจำนวนที่ติ๊กแยกตามแต่ละชั้น
        let floor1Total = 0, floor1Checked = 0;
        let floor2Total = 0, floor2Checked = 0;

        checkboxes.forEach(checkbox => {
            const floor = checkbox.getAttribute('data-floor');
            if (floor === '1') floor1Total++;
            if (floor === '2') floor2Total++;

            if (checkbox.checked) {
                checkedCount++;
                if (floor === '1') floor1Checked++;
                if (floor === '2') floor2Checked++;
            }
        });

        // คำนวณเปอร์เซ็นต์รวม
        const percent = total > 0 ? Math.round((checkedCount / total) * 100) : 0;
        
        // อัปเดตการแสดงผลบนหน้าเว็บ
        progressBar.style.width = `${percent}%`;
        progressPercent.innerText = `${percent}%`;

        document.getElementById('floor1-status').innerText = `${floor1Checked} / ${floor1Total}`;
        document.getElementById('floor2-status').innerText = `${floor2Checked} / ${floor2Total}`;

        // บันทึกสถานะลง LocalStorage (เวลาโหลดหน้าเว็บใหม่ ข้อมูลจะไม่หาย)
        const checkStatus = Array.from(checkboxes).map(cb => cb.checked);
        localStorage.setItem('doorsProgress', JSON.stringify(checkStatus));
    }

    // โหลดข้อมูลเดิมที่เคยบันทึกไว้
    function loadProgress() {
        const savedStatus = JSON.parse(localStorage.getItem('doorsProgress'));
        if (savedStatus) {
            checkboxes.forEach((checkbox, index) => {
                if(savedStatus[index] !== undefined) {
                    checkbox.checked = savedStatus[index];
                }
            });
        }
        updateProgress();
    }

    // ใส่ Event Listener ให้ทุก Checkbox
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', updateProgress);
    });

    // เริ่มทำงานเมื่อเปิดเว็บ
    window.addEventListener('DOMContentLoaded', loadProgress);
</script>

</body>
              </html>
